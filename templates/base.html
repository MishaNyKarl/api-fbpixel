<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "API Pixel" }}</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Arial, sans-serif; color: #0f172a; background: linear-gradient(180deg, #f8fafc 0%, #eef3f9 100%); }
    header { background: rgba(15, 23, 42, .92); color: #fff; padding: 14px 24px; display: flex; gap: 18px; align-items: center; backdrop-filter: blur(18px); box-shadow: 0 1px 0 rgba(255,255,255,.08) inset; }
    header a { color: #dbeafe; text-decoration: none; }
    header .muted { color: #aebed5; margin-left: auto; }
    main { padding: 24px; width: 100%; box-sizing: border-box; }
    table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,.86); border: 1px solid rgba(148, 163, 184, .35); }
    th, td { padding: 10px 12px; border-bottom: 1px solid #e5eaf3; text-align: left; vertical-align: top; }
    th { background: #eef2f7; font-size: 13px; }
    input, textarea, select { width: 100%; box-sizing: border-box; padding: 9px 10px; border: 1px solid rgba(148, 163, 184, .45); border-radius: 9px; font: inherit; background: rgba(255,255,255,.86); box-shadow: 0 1px 1px rgba(15,23,42,.03); }
    textarea { min-height: 100px; resize: vertical; }
    label { display: block; margin: 14px 0 6px; font-weight: 700; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .actions { display: flex; gap: 8px; align-items: center; margin: 16px 0; flex-wrap: wrap; }
    .btn { border: 0; border-radius: 9px; padding: 9px 13px; background: rgba(37,99,235,.9); color: #fff; text-decoration: none; cursor: pointer; font: inherit; font-weight: 600; display: inline-block; white-space: nowrap; box-shadow: 0 8px 18px rgba(37,99,235,.16); opacity: .94; }
    .btn.secondary { background: rgba(51,65,85,.86); }
    .btn.danger { background: #dc2626; }
    .btn.ok { background: #15803d; }
    .muted { color: #64748b; font-size: 13px; }
    .notice { background: #ecfdf5; border: 1px solid #86efac; padding: 12px; border-radius: 6px; margin: 12px 0; }
    code, pre { background: #eef2f7; border-radius: 6px; }
    code { padding: 2px 5px; }
    pre { padding: 12px; overflow: auto; }
    .status-ok { color: #15803d; font-weight: 700; }
    .status-bad { color: #dc2626; font-weight: 700; }
    .status-warn { color: #b45309; font-weight: 700; }
    .pill { padding: 2px 7px; border-radius: 999px; background: #e5e7eb; font-size: 12px; display: inline-block; margin: 1px 0; }
    .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; align-items: center; margin: 16px 0; }
    .filters .wide { grid-column: span 2; }
    .quick-filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 8px 0 16px; }
    .filters input, .filters select { min-width: 0; }
    .table-shell { position: relative; width: 100%; }
    .table-wrap { overflow: auto; border: 1px solid rgba(148, 163, 184, .35); background: rgba(255,255,255,.72); border-radius: 14px; box-shadow: 0 16px 40px rgba(15,23,42,.07); backdrop-filter: blur(18px); }
    .table-wrap table { border: 0; min-width: 100%; }
    .resizable-table { table-layout: fixed; width: 100%; }
    .logs-table { --logs-font-size: 13px; }
    .logs-table th, .logs-table td { padding: 5px 7px; font-size: var(--logs-font-size); line-height: 1.24; border-right: 1px solid rgba(148, 163, 184, .42); }
    .logs-table th:last-child, .logs-table td:last-child { border-right: 0; }
    .logs-table th { position: relative; user-select: none; box-shadow: inset -1px 0 0 rgba(100,116,139,.55); }
    .logs-table td { overflow: hidden; text-overflow: ellipsis; white-space: normal; }
    .row-number { color: #64748b; font-variant-numeric: tabular-nums; text-align: right; }
    .mono { font-family: Consolas, Monaco, monospace; }
    .long { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; word-break: break-all; }
    .duplicate-row { background: #fffbeb; }
    .domain-cell { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .domain-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .domain-link-button { width: 22px; height: 22px; margin-left: auto; border: 1px solid rgba(37,99,235,.16); border-radius: 999px; background: rgba(219,234,254,.68); color: #2563eb; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: background .15s ease, color .15s ease, transform .15s ease; }
    .domain-link-button:hover, .domain-link-button:focus { background: #2563eb; color: #fff; transform: translateY(-1px); outline: 0; }
    .domain-link-button svg { width: 13px; height: 13px; stroke: currentColor; }
    .domain-popover { position: fixed; z-index: 50; display: none; max-width: min(760px, calc(100vw - 32px)); padding: 12px; border: 1px solid rgba(255,255,255,.62); border-radius: 18px; background: rgba(248,250,252,.74); box-shadow: 0 22px 60px rgba(15,23,42,.22); backdrop-filter: blur(24px) saturate(160%); opacity: .9; }
    .domain-popover.is-open { display: grid; grid-template-columns: minmax(260px, 1fr) auto; align-items: center; gap: 10px; }
    .domain-popover .copy-url { border: 0; border-radius: 999px; padding: 8px 12px; background: rgba(37,99,235,.92); color: #fff; cursor: pointer; white-space: nowrap; order: 2; }
    .domain-popover.copy-left .copy-url { order: -1; }
    .domain-popover.copy-right .copy-url { order: 2; }
    .domain-popover .full-url-field { width: min(620px, calc(100vw - 180px)); min-height: 58px; max-height: 92px; padding: 8px 10px; border: 1px solid rgba(148,163,184,.28); border-radius: 12px; background: rgba(255,255,255,.62); color: #0f172a; font-family: Consolas, Monaco, monospace; font-size: 11px; line-height: 1.35; resize: none; outline: none; overflow: auto; box-shadow: inset 0 1px 2px rgba(15,23,42,.05); }
    .domain-popover .full-url-field:focus { border-color: rgba(37,99,235,.55); box-shadow: 0 0 0 3px rgba(37,99,235,.10), inset 0 1px 2px rgba(15,23,42,.05); }
    .column-resize-handle { position: absolute; top: 0; right: -7px; width: 14px; height: 100%; cursor: col-resize; z-index: 2; }
    .column-resize-handle::before { content: ""; position: absolute; top: 7px; bottom: 7px; left: 6px; width: 2px; border-radius: 999px; background: rgba(100,116,139,.62); box-shadow: 0 0 0 1px rgba(255,255,255,.65); transition: background .15s ease, box-shadow .15s ease, width .15s ease; }
    .column-resize-handle::after { content: ""; position: absolute; top: 50%; left: 3px; width: 8px; height: 28px; border-radius: 999px; background: rgba(37,99,235,.10); transform: translateY(-50%) scaleX(.8); opacity: 0; pointer-events: none; transition: opacity .15s ease, transform .15s ease; }
    .logs-table th:hover .column-resize-handle::before,
    .logs-table th.is-resizing .column-resize-handle::before { background: #2563eb; width: 3px; box-shadow: 0 0 0 4px rgba(37,99,235,.12); }
    .logs-table th:hover .column-resize-handle::after,
    .logs-table th.is-resizing .column-resize-handle::after { opacity: 1; transform: translateY(-50%) scaleX(1); }
    .column-resizing { cursor: col-resize !important; user-select: none; }
    .column-resizing * { cursor: col-resize !important; }
    .table-toolbar { display: flex; align-items: center; gap: 10px; margin: 12px 0 8px; flex-wrap: wrap; }
    .table-toolbar label { display: inline-flex; align-items: center; gap: 8px; margin: 0; font-weight: 700; }
    .table-toolbar input[type="range"] { width: 180px; padding: 0; }
    .table-toolbar output { min-width: 44px; font-family: Consolas, Monaco, monospace; color: #334155; }
    .filters .btn, .quick-filters .btn, .table-toolbar .btn { border: 1px solid rgba(255,255,255,.58); background: rgba(51,65,85,.72); color: #fff; border-radius: 14px; font-weight: 600; opacity: .9; backdrop-filter: blur(18px) saturate(160%); box-shadow: 0 12px 28px rgba(15,23,42,.13), inset 0 1px 0 rgba(255,255,255,.22); }
    .filters .btn:not(.secondary) { background: rgba(37,99,235,.82); }
    .filters .btn:hover, .quick-filters .btn:hover, .table-toolbar .btn:hover { opacity: 1; transform: translateY(-1px); }
    .table-settings-button { position: absolute; right: 12px; top: 12px; z-index: 5; width: 36px; height: 36px; border: 1px solid rgba(148,163,184,.36); border-radius: 999px; background: rgba(255,255,255,.38); color: rgba(15,23,42,.58); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; opacity: .55; backdrop-filter: blur(16px); transition: opacity .15s ease, color .15s ease, background .15s ease, transform .15s ease; }
    .table-settings-button:hover, .table-settings-button:focus, .table-settings-button.is-open { opacity: 1; color: #0f172a; background: rgba(255,255,255,.86); transform: translateY(-1px); outline: 0; }
    .table-settings-button svg { width: 18px; height: 18px; stroke: currentColor; }
    .column-settings-popover { position: absolute; right: 12px; top: 56px; z-index: 20; display: none; width: min(320px, calc(100vw - 48px)); max-height: min(520px, calc(100vh - 160px)); overflow: auto; padding: 14px; border: 1px solid rgba(255,255,255,.62); border-radius: 22px; background: rgba(248,250,252,.78); box-shadow: 0 24px 70px rgba(15,23,42,.20); backdrop-filter: blur(24px) saturate(160%); opacity: .9; }
    .column-settings-popover.is-open { display: block; }
    .column-settings-title { margin: 0 0 10px; font-size: 15px; font-weight: 800; }
    .layout-presets { display: grid; gap: 8px; margin-bottom: 14px; }
    .layout-presets-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .layout-presets-head .column-settings-title { margin: 0; }
    .layout-save-button { width: 32px; height: 32px; border: 0; border-radius: 999px; background: rgba(37,99,235,.86); color: #fff; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 10px 24px rgba(37,99,235,.18); opacity: .9; }
    .layout-save-button svg { width: 17px; height: 17px; stroke: currentColor; }
    .column-filter-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 4px; margin: 8px 0 14px; border-radius: 999px; background: rgba(15,23,42,.08); box-shadow: inset 0 1px 2px rgba(15,23,42,.08); }
    .column-filter-tabs button { border: 0; border-radius: 999px; padding: 8px 10px; background: transparent; color: #475569; cursor: pointer; font: inherit; font-size: 13px; }
    .column-filter-tabs button.is-active { background: rgba(255,255,255,.92); color: #0f172a; box-shadow: 0 6px 18px rgba(15,23,42,.12); }
    .column-settings-list { display: grid; gap: 6px; }
    .column-toggle { width: 100%; border: 0; border-radius: 12px; padding: 9px 10px; background: rgba(255,255,255,.58); color: #0f172a; display: grid; grid-template-columns: minmax(0, 1fr) 24px 24px; align-items: center; gap: 10px; font: inherit; text-align: left; }
    .column-toggle:hover { background: rgba(255,255,255,.95); }
    .column-toggle.is-dragging { opacity: .45; }
    .column-toggle.is-filter-hidden { display: none; }
    .column-toggle .column-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .column-eye-button, .column-drag-handle { width: 24px; height: 24px; border: 0; border-radius: 8px; background: transparent; color: #2563eb; display: inline-flex; align-items: center; justify-content: center; padding: 0; }
    .column-eye-button { cursor: pointer; }
    .column-drag-handle { color: #64748b; cursor: grab; }
    .column-drag-handle:active { cursor: grabbing; }
    .column-drag-handle svg { width: 18px; height: 18px; stroke: currentColor; }
    .column-toggle .eye { width: 19px; height: 19px; color: currentColor; flex: 0 0 auto; }
    .column-toggle.is-hidden { color: #64748b; }
    .column-toggle.is-hidden .eye-off-line { display: block; }
    .column-toggle .eye-off-line { display: none; }
    .is-column-hidden { display: none !important; }
    .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin: 16px 0; }
    .metric-card { padding: 14px; border: 1px solid rgba(148,163,184,.35); border-radius: 16px; background: rgba(255,255,255,.74); box-shadow: 0 14px 34px rgba(15,23,42,.07); backdrop-filter: blur(18px) saturate(150%); }
    .metric-card .label { color: #64748b; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }
    .metric-card .value { margin-top: 6px; font-size: 26px; font-weight: 800; }
    .quality-table td, .quality-table th, .diagnostic-table td, .diagnostic-table th { font-size: 13px; }
    .quality-bar { height: 7px; border-radius: 999px; background: rgba(148,163,184,.22); overflow: hidden; min-width: 90px; }
    .quality-bar span { display: block; height: 100%; border-radius: inherit; background: #2563eb; }
    .quality-bar.warn span { background: #d97706; }
    .quality-bar.bad span { background: #dc2626; }
    .timeline { display: grid; gap: 10px; margin: 16px 0; }
    .timeline-item { padding: 12px 14px; border: 1px solid rgba(148,163,184,.32); border-radius: 16px; background: rgba(255,255,255,.78); box-shadow: 0 12px 28px rgba(15,23,42,.06); }
    .timeline-head { display: flex; gap: 10px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .issue-list { display: grid; gap: 8px; margin: 14px 0; padding: 0; list-style: none; }
    .issue-list li { padding: 10px 12px; border-radius: 12px; background: rgba(254,243,199,.85); color: #92400e; }
  </style>
</head>
<body>
  <header>
    <strong>API Pixel</strong>
    <a href="/admin/pixels">Пиксели</a>
    <a href="/admin/logs">Логи Meta</a>
    <a href="/admin/quality">Quality</a>
    <a href="/admin/diagnostics">Diagnostics</a>
    {% if current_user and current_user.is_admin %}
    <a href="/admin/users">Пользователи</a>
    {% endif %}
    {% if current_user %}
    <span class="muted">{{ current_user.username }} / {{ current_user.role }}</span>
    {% endif %}
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
