<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "API Pixel" }}</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; color: #172033; background: #f5f7fb; }
    header { background: #111827; color: #fff; padding: 14px 24px; display: flex; gap: 18px; align-items: center; }
    header a { color: #dbeafe; text-decoration: none; }
    header .muted { color: #aebed5; margin-left: auto; }
    main { padding: 24px; max-width: 1680px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #d7deea; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #e5eaf3; text-align: left; vertical-align: top; }
    th { background: #eef2f7; font-size: 13px; }
    input, textarea, select { width: 100%; box-sizing: border-box; padding: 9px 10px; border: 1px solid #c8d2e0; border-radius: 6px; font: inherit; background: #fff; }
    textarea { min-height: 100px; resize: vertical; }
    label { display: block; margin: 14px 0 6px; font-weight: 700; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .actions { display: flex; gap: 8px; align-items: center; margin: 16px 0; flex-wrap: wrap; }
    .btn { border: 0; border-radius: 6px; padding: 9px 13px; background: #2563eb; color: #fff; text-decoration: none; cursor: pointer; font: inherit; display: inline-block; white-space: nowrap; }
    .btn.secondary { background: #4b5563; }
    .btn.danger { background: #dc2626; }
    .btn.ok { background: #15803d; }
    .muted { color: #64748b; font-size: 13px; }
    .notice { background: #ecfdf5; border: 1px solid #86efac; padding: 12px; border-radius: 6px; margin: 12px 0; }
    code, pre { background: #eef2f7; border-radius: 6px; }
    code { padding: 2px 5px; }
    pre { padding: 12px; overflow: auto; }
    .status-ok { color: #15803d; font-weight: 700; }
    .status-bad { color: #dc2626; font-weight: 700; }
    .status-warn { color: #b45309; font-weight: 700; }
    .pill { padding: 2px 7px; border-radius: 999px; background: #e5e7eb; font-size: 12px; display: inline-block; margin: 1px 0; }
    .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; align-items: center; margin: 16px 0; }
    .filters .wide { grid-column: span 2; }
    .quick-filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 8px 0 16px; }
    .filters input, .filters select { min-width: 0; }
    .table-wrap { overflow: auto; border: 1px solid #d7deea; background: #fff; }
    .table-wrap table { border: 0; min-width: 1500px; }
    .resizable-table { table-layout: fixed; width: max-content; }
    .logs-table { --logs-font-size: 13px; }
    .logs-table th, .logs-table td { padding: 8px 9px; font-size: var(--logs-font-size); border-right: 1px solid #cbd5e1; }
    .logs-table th:last-child, .logs-table td:last-child { border-right: 0; }
    .logs-table th { position: relative; user-select: none; box-shadow: inset -1px 0 0 #94a3b8; }
    .logs-table td { overflow: hidden; text-overflow: ellipsis; }
    .mono { font-family: Consolas, Monaco, monospace; }
    .long { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .duplicate-row { background: #fffbeb; }
    .domain-details summary { cursor: pointer; list-style: none; white-space: nowrap; }
    .domain-details summary::-webkit-details-marker { display: none; }
    .domain-details .plus { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 4px; background: #dbeafe; color: #1d4ed8; font-weight: 700; margin-right: 4px; }
    .domain-details[open] .plus { background: #fee2e2; color: #b91c1c; }
    .domain-details[open] .plus::before { content: "-"; }
    .domain-details[open] .plus { font-size: 0; }
    .full-url { display: block; max-width: 420px; margin-top: 6px; color: #2563eb; white-space: normal; overflow-wrap: anywhere; }
    .column-resize-handle { position: absolute; top: 0; right: -7px; width: 14px; height: 100%; cursor: col-resize; z-index: 2; }
    .column-resize-handle::before { content: ""; position: absolute; top: 6px; bottom: 6px; left: 6px; width: 3px; border-radius: 2px; background: #94a3b8; box-shadow: 0 0 0 1px rgba(255,255,255,.7); }
    .column-resize-handle::after { content: "↔"; position: absolute; top: 50%; right: -11px; transform: translateY(-50%); padding: 1px 4px; border-radius: 4px; background: #2563eb; color: #fff; font-size: 11px; line-height: 1.2; opacity: 0; pointer-events: none; }
    .logs-table th:hover .column-resize-handle::before,
    .logs-table th.is-resizing .column-resize-handle::before { background: #2563eb; width: 4px; }
    .logs-table th:hover .column-resize-handle::after,
    .logs-table th.is-resizing .column-resize-handle::after { opacity: 1; }
    .column-resizing { cursor: col-resize !important; user-select: none; }
    .column-resizing * { cursor: col-resize !important; }
    .table-toolbar { display: flex; align-items: center; gap: 10px; margin: 12px 0 8px; flex-wrap: wrap; }
    .table-toolbar label { display: inline-flex; align-items: center; gap: 8px; margin: 0; font-weight: 700; }
    .table-toolbar input[type="range"] { width: 180px; padding: 0; }
    .table-toolbar output { min-width: 44px; font-family: Consolas, Monaco, monospace; color: #334155; }
  </style>
</head>
<body>
  <header>
    <strong>API Pixel</strong>
    <a href="/admin/pixels">Пиксели</a>
    <a href="/admin/logs">Логи Meta</a>
    {% if current_user and current_user.is_admin %}
    <a href="/admin/users">Пользователи</a>
    {% endif %}
    {% if current_user %}
    <span class="muted">{{ current_user.username }} / {{ current_user.role }}</span>
    {% endif %}
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
