name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt

      - name: Compile
        run: python -m py_compile main.py scripts/smoke_test.py

      - name: Smoke test
        run: python scripts/smoke_test.py

      - name: Prepare archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.venv' \
            --exclude='.venv-local' \
            --exclude='__pycache__' \
            --exclude='*.db' \
            -czf /tmp/api-fbpixel-${{ github.sha }}.tar.gz .

      - name: Upload archive
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" /tmp/api-fbpixel-${{ github.sha }}.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/api-fbpixel-${{ github.sha }}.tar.gz"

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" << 'EOF'
          set -euo pipefail
          APP_DIR=/opt/api-pixel
          ARCHIVE=/tmp/api-fbpixel-${{ github.sha }}.tar.gz
          cd "$APP_DIR"
          tar -xzf "$ARCHIVE" -C "$APP_DIR"
          chown -R api-pixel:api-pixel "$APP_DIR"
          "$APP_DIR/.venv/bin/pip" install -r "$APP_DIR/requirements.lock.txt"
          systemctl restart api-pixel
          systemctl is-active --quiet api-pixel
          EOF
